services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hybrid_auto_parts}
      POSTGRES_USER: ${POSTGRES_USER:-hybrid_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hybrid_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hybrid_user} -d ${POSTGRES_DB:-hybrid_auto_parts}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
      APP_RELEASE_VERSION: ${APP_RELEASE_VERSION:-dev-local}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET:-hybrid-auto-parts-local-jwt-secret-change-me-2026}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/hybrid_auto_parts}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-hybrid_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-hybrid_password}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4173,http://localhost:3000}
      APP_MEDIA_UPLOADS_PATH: /app/uploads
      APP_MEDIA_URL_PREFIX: ${APP_MEDIA_URL_PREFIX:-/uploads}
    ports:
      - "8080:8080"
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:80"

volumes:
  postgres-data:
  backend-uploads:
