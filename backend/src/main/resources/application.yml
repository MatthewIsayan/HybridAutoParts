spring:
  application:
    name: hybrid-auto-parts-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hybrid_auto_parts}
    username: ${SPRING_DATASOURCE_USERNAME:hybrid_user}
    password: ${SPRING_DATASOURCE_PASSWORD:hybrid_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

server:
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: Hybrid Auto Parts
    environment: ${APP_ENVIRONMENT:local}
    version: ${APP_RELEASE_VERSION:dev}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:hybrid-auto-parts-phase-2-local-jwt-secret-2026}
      expiration: ${APP_SECURITY_JWT_EXPIRATION:PT8H}
  media:
    uploads-path: ${APP_MEDIA_UPLOADS_PATH:uploads}
    url-prefix: ${APP_MEDIA_URL_PREFIX:/uploads}
